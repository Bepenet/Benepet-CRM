<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lançar Venda - BenePet CRM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width: 900px; margin: 0 auto; padding: 20px;">
        <h2>🛒 Lançamento de Venda Múltipla</h2>
        
        <div style="background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; align-items: flex-end;">
            <div style="flex: 1;">
                <label style="display:block; margin-bottom:5px; font-weight:bold;">Selecione o Cliente:</label>
                <select id="cliente_id" style="width:100%; padding:8px;">
                    {% for c in clientes %}
                        <option value="{{ c.id }}">{{ c.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label style="display:block; margin-bottom:5px; font-weight:bold;">Data da Venda:</label>
                <input type="date" id="data_venda" style="padding:7px;">
            </div>
        </div>

        <fieldset style="border: 1px solid #ddd; padding: 15px; border-radius: 6px; margin-bottom: 20px;">
            <legend style="font-weight: bold; padding: 0 10px;">Adicionar Item</legend>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="prod_nome" placeholder="Nome do Produto/Serviço" style="flex: 2; padding: 8px;">
                <input type="number" id="prod_qtd" placeholder="Qtd" value="1" style="flex: 0.5; padding: 8px;">
                <input type="number" step="0.01" id="prod_valor" placeholder="Valor Unitário (R$)" style="flex: 1; padding: 8px;">
                <button type="button" onclick="adicionarAoCarrinho()" style="background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">+</button>
            </div>
        </fieldset>

        <h3>Itens da Venda</h3>
        <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
            <thead>
                <tr style="background: #e9ecef; text-align: left;">
                    <th style="padding: 10px;">Produto</th>
                    <th style="padding: 10px;">Qtd</th>
                    <th style="padding: 10px;">Unitário</th>
                    <th style="padding: 10px;">Subtotal</th>
                    <th style="padding: 10px;">Ação</th>
                </tr>
            </thead>
            <tbody id="corpo_carrinho">
                </tbody>
        </table>

        <div style="text-align: right; margin-bottom: 20px;">
            <h3 style="margin: 0;">Total da Venda: <span id="total_geral" style="color: #28a745;">R$ 0,00</span></h3>
        </div>

        <button type="button" onclick="finalizarVenda()" style="background: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%;">Gravar Venda no Sistema</button>
        
        <br><br>
        <a href="/dashboard">← Voltar ao Dashboard</a>
    </div>

    <script>
        let carrinho = [];

        // Define a data de hoje no input automaticamente
        document.getElementById('data_venda').value = new Date().toISOString().substring(0, 10);

        function adicionarAoCarrinho() {
            const produto = document.getElementById('prod_nome').value;
            const quantidade = parseInt(document.getElementById('prod_qtd').value);
            const valor_unitario = parseFloat(document.getElementById('prod_valor').value);

            if (!produto || isNaN(quantidade) || isNaN(valor_unitario)) {
                alert("Por favor, preencha todos os campos do produto corretamente.");
                return;
            }

            const valor_subtotal = quantidade * valor_unitario;
            carrinho.push({ produto, quantidade, valor_unitario, valor_subtotal });

            atualizarTabela();

            // Limpa os campos de texto do item
            document.getElementById('prod_nome').value = '';
            document.getElementById('prod_valor').value = '';
            document.getElementById('prod_qtd').value = '1';
        }

        function removerDoCarrinho(index) {
            carrinho.splice(index, 1);
            atualizarTabela();
        }

        function atualizarTabela() {
            const tbody = document.getElementById('corpo_carrinho');
            tbody.innerHTML = '';
            let total = 0;

            carrinho.forEach((item, index) => {
                total += item.valor_subtotal;
                tbody.innerHTML += `
                    <tr style="border-bottom: 1px solid #ddd;">
                        <td style="padding: 10px;">${item.produto}</td>
                        <td style="padding: 10px;">${item.quantidade}</td>
                        <td style="padding: 10px;">R$ ${item.valor_unitario.toFixed(2)}</td>
                        <td style="padding: 10px;">R$ ${item.valor_subtotal.toFixed(2)}</td>
                        <td style="padding: 10px;"><button style="background:#dc3545; color:white; border:none; padding:3px 8px; border-radius:3px; cursor:pointer;" onclick="removerDoCarrinho(${index})">Remover</button></td>
                    </tr>
                `;
            });

            document.getElementById('total_geral').innerText = `R$ ${total.toFixed(2)}`;
        }

        function finalizarVenda() {
            if (carrinho.length === 0) {
                alert("O carrinho está vazio! Adicione pelo menos um item.");
                return;
            }

            const payload = {
                cliente_id: document.getElementById('cliente_id').value,
                data: document.getElementById('data_venda').value,
                valor_total: carrinho.reduce((sum, item) => sum + item.valor_subtotal, 0),
                itens: carrinho
            };

            fetch('/salvar_venda_multipla', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if(res.ok) {
                    alert("Perfeito! Venda salva com sucesso!");
                    window.location.href = '/dashboard';
                } else {
                    alert("Erro interno ao tentar salvar a venda.");
                }
            });
        }
    </script>
</body>
</html>
