<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BENEPET - CRM</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .login-body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
        }
        
        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-sizing: border-box;
        }

        .login-logo {
            max-width: 160px;
            height: auto;
            margin-bottom: 15px;
        }

        .login-card h2 {
            font-size: 16px;
            margin-bottom: 30px;
            color: #7f8c8d;
            font-weight: 500;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .login-form input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
        }

        .login-form input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        .login-form button {
            background-color: #e74c3c; /* Cor vermelha aproximada da sua logo */
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .login-form button:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body class="login-body">

    <div class="login-card">
        <img src="/static/logo.png" alt="Logo BENEPET" class="login-logo">
        <h2>Acesso ao sistema</h2>

        <form action="/login" method="POST" class="login-form"></form>
            <input type="text" name="usuario" placeholder="Usuário" required autofocus>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
    </div>

</body>
</html>
